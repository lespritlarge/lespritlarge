<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Catalogue — Librairie L'Esprit Large</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;1,600&family=Lora:ital,wght@0,400;1,400&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#f2f0ef;--warm:#f7f5f4;--wood:#8b2e2e;--dark:#5c1a1a;--ink:#1e1e1e;--soft:#3a3a3a;--parch:#ebe8e4;--amber:#c4854a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Raleway',sans-serif;background:var(--warm);color:var(--ink);}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(242,240,239,.97);backdrop-filter:blur(8px);border-bottom:1px solid rgba(92,26,26,.12);padding:0 2rem;height:80px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:800;font-style:italic;color:var(--dark);}
.nav-logo img{width:56px;height:56px;object-fit:contain;}
.nav-logo span{color:var(--amber);}
.nav-back{font-family:'Raleway',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);text-decoration:none;border:1px solid rgba(92,26,26,.2);padding:.4rem 1rem;border-radius:2px;transition:all .2s;}
.nav-back:hover{color:var(--wood);border-color:var(--wood);}

.hero{margin-top:80px;background:var(--dark);padding:3rem 4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:800;font-style:italic;color:var(--cream);}
.hero h1 span{color:#e8b97a;}
.hero-stats{display:flex;gap:2rem;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-n{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:#e8b97a;}
.stat-l{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,240,239,.5);}

.toolbar{background:var(--cream);border-bottom:1px solid rgba(92,26,26,.1);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:80px;z-index:50;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-wrap input{width:100%;padding:.65rem 1rem .65rem 2.4rem;font-family:'Lora',serif;font-size:.9rem;border:1.5px solid rgba(92,26,26,.18);border-radius:3px;background:var(--warm);color:var(--ink);outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--wood);}
.search-wrap::before{content:'🔍';position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none;}
.filters{display:flex;gap:.4rem;flex-wrap:wrap;}
.tag{font-family:'Raleway',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .85rem;border-radius:20px;cursor:pointer;border:1.5px solid rgba(92,26,26,.15);color:var(--soft);background:var(--warm);transition:all .2s;white-space:nowrap;}
.tag:hover{border-color:var(--wood);color:var(--wood);}
.tag.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.sort-sel{font-family:'Raleway',sans-serif;font-size:.72rem;font-weight:600;padding:.5rem .8rem;border:1.5px solid rgba(92,26,26,.18);border-radius:3px;background:var(--warm);color:var(--ink);cursor:pointer;outline:none;}

.results-bar{padding:.6rem 2rem;font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--soft);background:var(--warm);}

.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.2rem;padding:1.5rem 2rem;}
.book-card{background:var(--cream);border-radius:6px;overflow:hidden;box-shadow:0 2px 10px rgba(30,10,10,.07);transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;}
.book-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(30,10,10,.13);}
.book-cover{height:220px;position:relative;background:#e8e4e0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.book-cover img{width:100%;height:100%;object-fit:cover;}
.book-cover .no-cover{font-size:3rem;}
.book-badge{position:absolute;top:.5rem;left:.5rem;font-family:'Raleway',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2px;}
.badge-fav{background:var(--dark);color:var(--cream);}
.badge-low{background:#c4854a;color:var(--cream);}
.badge-out{background:#888;color:var(--cream);}
.book-info{padding:.9rem;flex:1;display:flex;flex-direction:column;gap:.3rem;}
.book-title{font-family:'Lora',serif;font-size:.88rem;font-weight:500;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-author{font-size:.75rem;color:var(--soft);}
.book-genre{font-size:.63rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--parch);color:var(--soft);padding:.15rem .5rem;border-radius:2px;width:fit-content;}
.book-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:.5rem;}
.book-price{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--dark);}
.stock-ok{color:#2d7a3a;font-size:.68rem;font-weight:600;}
.stock-low{color:#c4854a;font-size:.68rem;font-weight:600;}
.stock-out{color:#888;font-size:.68rem;}
.btn-reserve{width:100%;margin-top:.5rem;padding:.55rem;font-family:'Raleway',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:background .2s;}
.btn-reserve.available{background:var(--dark);color:var(--cream);}
.btn-reserve.available:hover{background:var(--ink);}
.btn-reserve.unavailable{background:#e0dbd8;color:#999;cursor:not-allowed;}

.pagination{display:flex;justify-content:center;align-items:center;gap:.5rem;padding:2rem;flex-wrap:wrap;}
.page-btn{font-family:'Raleway',sans-serif;font-size:.75rem;font-weight:700;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(92,26,26,.18);border-radius:3px;cursor:pointer;background:var(--cream);color:var(--soft);transition:all .2s;}
.page-btn:hover{border-color:var(--wood);color:var(--wood);}
.page-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.page-btn.dots{cursor:default;border:none;background:none;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--cream);border-radius:8px;padding:2rem;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--soft);}
.modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;font-style:italic;color:var(--dark);margin-bottom:1.2rem;}
.modal .f{margin-bottom:.9rem;}
.modal label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin-bottom:.3rem;}
.modal input{width:100%;padding:.7rem .9rem;font-family:'Lora',serif;font-size:.9rem;border:1.5px solid rgba(92,26,26,.18);border-radius:3px;background:var(--warm);color:var(--ink);outline:none;}
.modal input:focus{border-color:var(--wood);}
.modal-btn{width:100%;padding:.85rem;font-weight:700;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;background:var(--dark);color:var(--cream);border:none;cursor:pointer;border-radius:2px;margin-top:.5rem;transition:background .2s;}
.modal-btn:hover{background:var(--ink);}

.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--dark);color:var(--cream);font-size:.85rem;font-family:'Lora',serif;padding:.9rem 1.4rem;border-radius:4px;box-shadow:0 6px 24px rgba(0,0,0,.25);transform:translateY(120px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);}
.toast.show{transform:translateY(0);opacity:1;}

footer{text-align:center;padding:2rem;font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--soft);border-top:1px solid rgba(92,26,26,.1);}
footer a{color:var(--wood);text-decoration:none;}

@media(max-width:768px){
  .hero{padding:2rem 1.2rem;}
  .toolbar{padding:.8rem 1rem;top:80px;}
  .book-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem;padding:1rem;}
  .book-cover{height:180px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.png" alt="L'Esprit Large" onerror="this.style.display='none'"/>
    L'<span>Esprit</span> Large
  </a>
  <a href="index.html" class="nav-back">← Retour</a>
</nav>

<div class="hero">
  <div>
    <h1>Notre <span>Catalogue</span></h1>
    <p style="font-family:'Lora',serif;font-style:italic;font-size:.92rem;color:rgba(242,240,239,.6);margin-top:.4rem;">Stock mis à jour en temps réel</p>
  </div>
  <div class="hero-stats">
    <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Titres</div></div>
    <div class="stat"><div class="stat-n" id="statDispo">—</div><div class="stat-l">En stock</div></div>
    <div class="stat"><div class="stat-n" id="statGenres">—</div><div class="stat-l">Genres</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Titre, auteur, éditeur…" oninput="filtrer()"/>
  </div>
  <div class="filters" id="filterTags">
    <span class="tag active" onclick="setFilter('Tous',this)">Tous</span>
  </div>
  <select class="sort-sel" id="sortSel" onchange="filtrer()">
    <option value="titre">Titre A→Z</option>
    <option value="auteur">Auteur A→Z</option>
    <option value="prix">Prix croissant</option>
    <option value="stock">Stock décroissant</option>
  </select>
</div>

<div class="results-bar" id="resultsBar">Chargement…</div>
<div class="book-grid" id="bookGrid"></div>
<div class="pagination" id="pagination"></div>

<!-- MODAL RÉSERVATION -->
<div class="modal-overlay" id="reserveModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Réserver ce livre</h3>
    <p style="font-family:'Lora',serif;font-style:italic;font-size:.88rem;color:var(--soft);margin-bottom:1.2rem;" id="modalTitle"></p>
    <div class="f"><label>Votre nom *</label><input type="text" id="rNom" placeholder="Prénom Nom"/></div>
    <div class="f"><label>Téléphone *</label><input type="tel" id="rTel" placeholder="06 …"/></div>
    <div class="f"><label>Email</label><input type="email" id="rEmail" placeholder="vous@email.fr"/></div>
    <button class="modal-btn" onclick="soumettre()">Confirmer la réservation</button>
    <p style="font-family:'Lora',serif;font-style:italic;font-size:.72rem;color:rgba(60,40,40,.4);margin-top:.8rem;text-align:center;">Nous vous confirmerons la mise de côté par téléphone.</p>
  </div>
</div>

<footer>© 2026 Librairie L'Esprit Large · 12 Rue Vannetaise, Guérande · <a href="tel:0240234444">02 40 23 44 44</a> · <a href="index.html">Retour au site</a></footer>
<div class="toast" id="toast"></div>

<script>
let BOOKS = [];
let filtered = [];
let currentFilter = 'Tous';
let currentPage = 1;
const PER_PAGE = 30;
let selectedBook = null;

// ── CHARGEMENT ─────────────────────────
async function init() {
  try {
    const r = await fetch('stock.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();
    BOOKS = (data.livres || []).map((b, i) => ({
      id:         i + 1,
      ean:        b.ean,
      title:      b.titre     || '(Sans titre)',
      author:     b.auteur    || '',
      editeur:    b.editeur   || '',
      genre:      devinerGenre(b.titre, b.editeur),
      price:      b.prix      || '',
      prixNum:    parseFloat((b.prix || '0').replace(',','.').replace(/[^\d.]/g,'')) || 0,
      stock:      b.quantite  || 0,
      couverture: b.couverture|| '',
      fav:        false,
    }));

    // Charger les coups de coeur
    try {
      const r2 = await fetch('coups.json?t=' + Date.now());
      if (r2.ok) {
        const d2 = await r2.json();
        const eans = (d2.coups || []).map(c => c.ean);
        BOOKS.forEach(b => { b.fav = eans.includes(b.ean); });
      }
    } catch(_) {}

    // Stats
    const dispo = BOOKS.filter(b => b.stock > 0).length;
    const genres = [...new Set(BOOKS.map(b => b.genre))].length;
    document.getElementById('statTotal').textContent = BOOKS.length;
    document.getElementById('statDispo').textContent = dispo;
    document.getElementById('statGenres').textContent = genres;

    // Filtres dynamiques
    const genresList = ['Tous', ...new Set(BOOKS.map(b => b.genre)).values()].sort();
    const tagsEl = document.getElementById('filterTags');
    tagsEl.innerHTML = genresList.map(g =>
      `<span class="tag${g==='Tous'?' active':''}" onclick="setFilter('${g}',this)">${g}</span>`
    ).join('');

    filtrer();
  } catch(e) {
    document.getElementById('bookGrid').innerHTML = '<p style="grid-column:1/-1;padding:3rem;text-align:center;font-style:italic;color:#999;">Le catalogue sera bientôt disponible.</p>';
  }
}

// ── FILTRES ────────────────────────────
function devinerGenre(titre, editeur) {
  const t = ((titre||'') + ' ' + (editeur||'')).toLowerCase();
  if (t.includes('manga')||t.includes('shonen')||t.includes('seinen')) return 'Manga';
  if (t.includes('bande dessin')||t.includes(' bd ')||t.includes('dupuis')||t.includes('dargaud')||t.includes('casterman')||t.includes('comics')) return 'Bande dessinée';
  if (t.includes('jeunesse')||t.includes('école des loisirs')||t.includes('bayard')||t.includes('gallimard jeun')) return 'Jeunesse';
  if (t.includes('policier')||t.includes('thriller')||t.includes('crime')||t.includes('noir')) return 'Policier';
  if (t.includes('science-fiction')||t.includes(' sf ')||t.includes('fantasy')||t.includes('fantastique')) return 'SF / Fantasy';
  if (t.includes('poésie')||t.includes('poème')) return 'Poésie';
  if (t.includes('essai')||t.includes('biograph')||t.includes('document')) return 'Essai / Document';
  return 'Littérature';
}

function setFilter(genre, el) {
  currentFilter = genre;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentPage = 1;
  filtrer();
}

function filtrer() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSel').value;
  filtered = BOOKS.filter(b => {
    if (currentFilter !== 'Tous' && b.genre !== currentFilter) return false;
    if (q) {
      return b.title.toLowerCase().includes(q) ||
             b.author.toLowerCase().includes(q) ||
             b.editeur.toLowerCase().includes(q) ||
             b.ean.includes(q);
    }
    return true;
  });
  // Tri
  filtered.sort((a, b) => {
    if (sort === 'titre')  return a.title.localeCompare(b.title, 'fr');
    if (sort === 'auteur') return a.author.localeCompare(b.author, 'fr');
    if (sort === 'prix')   return a.prixNum - b.prixNum;
    if (sort === 'stock')  return b.stock - a.stock;
    return 0;
  });
  currentPage = 1;
  afficher();
}

// ── AFFICHAGE ──────────────────────────
function afficher() {
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);
  const grid  = document.getElementById('bookGrid');

  document.getElementById('resultsBar').textContent =
    `${filtered.length} livre${filtered.length>1?'s':''} trouvé${filtered.length>1?'s':''}` +
    (currentFilter !== 'Tous' ? ` · ${currentFilter}` : '');

  if (!page.length) {
    grid.innerHTML = '<p style="grid-column:1/-1;padding:3rem;text-align:center;font-style:italic;color:#999;">Aucun livre trouvé.</p>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  grid.innerHTML = page.map(b => {
    const sc = b.stock === 0 ? 'stock-out' : b.stock <= 2 ? 'stock-low' : 'stock-ok';
    const sl = b.stock === 0 ? 'Épuisé' : b.stock <= 2 ? `Plus que ${b.stock}` : `${b.stock} ex.`;
    const badge = b.fav ? '<span class="book-badge badge-fav">❤ Coup de cœur</span>'
                : b.stock === 0 ? '<span class="book-badge badge-out">Épuisé</span>'
                : b.stock <= 2  ? '<span class="book-badge badge-low">Derniers ex.</span>' : '';
    const couv = b.couverture
      ? `<img src="${b.couverture}" alt="${b.title}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=no-cover>📖</span>'">`
      : `<span class="no-cover">📖</span>`;
    return `<div class="book-card">
      <div class="book-cover">${badge}${couv}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <span class="book-genre">${b.genre}</span>
        <div class="book-footer">
          <span class="book-price">${b.price}</span>
          <span class="${sc}">● ${sl}</span>
        </div>
        <button class="btn-reserve ${b.stock>0?'available':'unavailable'}" onclick="openReserve(${b.id})" ${b.stock===0?'disabled':''}>
          ${b.stock>0?'Réserver':'Indisponible'}
        </button>
      </div>
    </div>`;
  }).join('');

  renderPagination();
  window.scrollTo({top: document.querySelector('.toolbar').offsetTop - 82, behavior: 'smooth'});
}

// ── PAGINATION ─────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  const p = currentPage;
  const pages = [];
  pages.push(1);
  if (p > 3) pages.push('…');
  for (let i = Math.max(2, p-1); i <= Math.min(total-1, p+1); i++) pages.push(i);
  if (p < total - 2) pages.push('…');
  if (total > 1) pages.push(total);

  if (p > 1) html += `<div class="page-btn" onclick="goPage(${p-1})">←</div>`;
  pages.forEach(pg => {
    if (pg === '…') html += `<div class="page-btn dots">…</div>`;
    else html += `<div class="page-btn ${pg===p?'active':''}" onclick="goPage(${pg})">${pg}</div>`;
  });
  if (p < total) html += `<div class="page-btn" onclick="goPage(${p+1})">→</div>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(n) { currentPage = n; afficher(); }

// ── RÉSERVATION ────────────────────────
function openReserve(id) {
  selectedBook = BOOKS.find(b => b.id === id);
  if (!selectedBook) return;
  document.getElementById('modalTitle').textContent = `${selectedBook.title} — ${selectedBook.author}`;
  ['rNom','rTel','rEmail'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('reserveModal').classList.add('open');
}
function closeModal() { document.getElementById('reserveModal').classList.remove('open'); }

async function soumettre() {
  const nom = document.getElementById('rNom').value.trim();
  const tel = document.getElementById('rTel').value.trim();
  if (!nom || !tel) { toast('⚠️ Nom et téléphone requis.'); return; }
  try {
    await fetch('https://formspree.io/f/mvzwkqzn', {
      method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({
        _subject: `Réservation : ${selectedBook.title}`,
        livre: selectedBook.title, auteur: selectedBook.author, ean: selectedBook.ean,
        nom, tel, email: document.getElementById('rEmail').value.trim()
      })
    });
    closeModal();
    toast('✅ Réservation envoyée ! Nous vous confirmons par téléphone.');
  } catch(e) { toast('⚠️ Erreur. Appelez-nous au 02 40 23 44 44.'); }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

document.getElementById('reserveModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

init();
</script>
</body>
</html>
